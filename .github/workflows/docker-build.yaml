name: Build and Push Frontend to Azure Container Registry

on:
  # Triggers the workflow on push to the main branch
  push:
    branches: [ main ]
  # Allows manual runs from the GitHub Actions tab
  workflow_dispatch:

# Define environment variables to centralize configuration
env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY_NAME }}
  IMAGE_NAME: 'sunchineca-fe' # Updated image name
  TAG_VERSION: 'v1' # Static version tag
  
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Best Practice: Set up QEMU for multi-platform build compatibility
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- ACR AUTHENTICATION ---
      - name: Login to Azure Container Registry (ACR)
        uses: docker/login-action@v3
        with:
          # Uses the full ACR registry URL (e.g., myregistry.azurecr.io)
          registry: ${{ env.ACR_REGISTRY }}
          # Uses the ACR Admin/Service Account credentials
          username: ${{ secrets.ACR_USERNAME }} 
          password: ${{ secrets.ACR_PASSWORD }}
            
      # --- BUILD AND PUSH ---
      - name: Build and Push Docker Image to ACR
        uses: docker/build-push-action@v5
        with:
          context: .
          # Enable push to the logged-in registry (ACR)
          push: true
          # Use static (v1) and latest tags
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG_VERSION }}
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:v10.9

      # --- WEB APP RESTART / CONTAINER UPDATE ---
      - name: Trigger Web App Update/Restart
        uses: azure/webapps-deploy@v2
        with:
          # Required: Name of the Azure Web App
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          # Recommended: Resource Group name for context
          resource-group-name: ${{ secrets.AZURE_RESOURCE_GROUP }}
          # Authentication: The entire contents of the Publish Profile XML secret
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          # Deployment: Tell the Web App to use the new image we just pushed to ACR
          images: ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:v10.9
